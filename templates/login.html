{{template "layout" .}}
{{define "title"}}Sign in — GitBox{{end}}
{{define "content"}}
<div class="auth-page">
  <div class="auth-card">
    <h1>Sign in to GitBox</h1>
    {{if .Error}}
    <div class="alert alert-error">{{.Error}}</div>
    {{end}}
    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" type="text" id="username" name="username" autocomplete="username"
          value="{{if .Data}}{{index .Data "Username"}}{{end}}" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center; padding:8px">Sign in</button>
    </form>
    <div class="auth-footer">
      New to GitBox? <a href="/register">Create an account</a>
    </div>
  </div>
</div>
{{end}}
